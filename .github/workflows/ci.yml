name: Go CI

on:
  push

jobs: 
    test:
      runs-on: ubuntu-latest
      strategy:
        matrix:
          go-version: ['1.25', '1.26']
      steps:
          - name: Checkout repository
            uses: actions/checkout@v6
              
          - name: Setup Go
            uses: actions/setup-go@v6
            with:
              go-version: ${{ matrix.go-version }}

          - name: Run test
            run: go test -coverprofile=coverage.out ./...

    benchmark:
      if: github.ref == 'refs/heads/main'
      runs-on: ubuntu-latest
      steps:
        - name: Checkout repository
          uses: actions/checkout@v6
              
        - name: Setup Go
          uses: actions/setup-go@v6
          with:
            go-version: 'stable'

        - name: Run benchmarks
          run: go test -bench . -run=^$ -benchmem ./... | tee benchmark.txt

    lint:
      runs-on: ubuntu-latest
      steps:
          - name: Checkout repository
            uses: actions/checkout@v6
              
          - name: Setup Go
            uses: actions/setup-go@v6
            with:
              go-version: 'stable'

          - name: Run linter
            uses: golangci/golangci-lint-action@v9
            with:
              version: v2.12