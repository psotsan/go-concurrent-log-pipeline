name: Go CI

on:
  push

jobs: 
    test:
      runs-on: ubuntu-latest
      strategy:
        matrix:
          go-version: ['1.25', '1.26']
      steps:
          - name: Checkout repository
            uses: actions/checkout@v6
              
          - name: Setup Go
            uses: actions/setup-go@v6
            with:
              go-version: ${{ matrix.go-version }}

          - name: Run test
            run: go test -race

    benchmark:
      if: github.ref == 'refs/heads/main'
      runs-on: ubuntu-latest
      steps:
        - name: Checkout repository
          uses: actions/checkout@v6
              
        - name: Setup Go
          uses: actions/setup-go@v6
          with:
            go-version: 'stable'

        - name: Run benchmarks
          run: go test -bench . -run=^$ -benchmem ./... | tee benchmark.txt

    lint:
      runs-on: ubuntu-latest
      steps:
          - name: Checkout repository
            uses: actions/checkout@v6
              
          - name: Setup Go
            uses: actions/setup-go@v6
            with:
              go-version: 'stable'

          - name: Run linter
            uses: golangci/golangci-lint-action@v9
            with:
              version: v2.12
    
    docker:
      if: github.ref == 'refs/heads/main'
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v6

        - name: Build Docker image
          run: docker build -t log-pipeline .
        
        - name: Run container with test log file
          run: docker run --rm -v ./testdata:/data log-pipeline -input /data/test.log > output.txt 2>errors.txt

        - name: Check DEBUG
          run: "grep -q \"DEBUG: 0\" output.txt || (echo \"test failed: expected DEBUG: 0\" && exit 1)"

        - name: Check ERROR
          run: "grep -q \"ERROR: 1\" output.txt || (echo \"test failed: expected ERROR: 1\" && exit 1)"

        - name: Check INFO
          run: "grep -q \"INFO: 2\" output.txt || (echo \"test failed: expected INFO: 2\" && exit 1)"

        - name: Check WARN
          run: "grep -q \"WARN: 0\" output.txt || (echo \"test failed: expected WARN: 0\" && exit 1)"

        - name: Check error output
          run: "grep -q \"line 3: invalid log level\" errors.txt || (echo \"test failed: line 3: invalid log level\" && exit 1)"